<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Toto's Adventure</title>\n</head>\n<body>\n    <h1>Toto's Adventure</h1>\n    <p>Welcome to Toto's interactive story! Choose your path wisely.</p>\n    <div id="choices">\n        <h2>Choices:</h2>\n        <button onclick="choose('forest')">Go to the Forest</button>\n        <button onclick="choose('castle')">Visit the Castle</button>\n    </div>\n    <div id="story"></div>\n    <script>\n        function choose(location) {\n            const story = document.getElementById('story');\n            if (location === 'forest') {\n                story.innerHTML = '<p>Toto enters the forest and meets a wise old owl.</p>' + \n                                 '<button onclick="choose('owl')">Talk to the Owl</button>' + \n                                 '<button onclick="choose('leave')">Leave the forest</button>';\n            } else if (location === 'castle') {\n                story.innerHTML = '<p>Toto arrives at the castle and sees a grand banquet.</p>' + \n                                 '<button onclick="choose('feast')">Join the Feast</button>' + \n                                 '<button onclick="choose('explore')">Explore the Castle</button>';\n            } else if (location === 'owl') {\n                story.innerHTML = '<p>The owl shares ancient wisdom with Toto.</p>' + \n                                 '<button onclick="choose('thank')">Thank the Owl</button>';\n            } else if (location === 'leave') {\n                story.innerHTML = '<p>Toto decides to leave the forest.</p>';\n            } else if (location === 'feast') {\n                story.innerHTML = '<p>Toto enjoys delicious food and makes new friends.</p>';} \n         else if (location === 'explore') {\n                story.innerHTML = '<p>Toto discovers secret passages in the castle.</p>';} \n         else if (location === 'thank') {\n                story.innerHTML = '<p>Toto thanks the owl and continues on his adventure.</p>';\n            }\n        }\n    </script>\n</body>\n</html>
